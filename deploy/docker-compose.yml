services:
  password-hook-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      HOOK_HMAC_SECRET: "local-development-secret"
      ENTRA_PRIMARY_DOMAIN: "nycu.edu.tw"
      PROBLEM_BASE_URL: "https://nycu.edu.tw/problems"
    ports:
      - "8080:8080"
